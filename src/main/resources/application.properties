spring.application.name=cp-dip
server.port=${PORT:8080}


# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Free Qdrant Cloud Configuration
qdrant.host=${QDRANT_HOST:localhost}
qdrant.port=${QDRANT_PORT:6334}
qdrant.api.key=${QDRANT_API_KEY:}
qdrant.use.tls=${QDRANT_USE_TLS:true}
qdrant.collection-name=${QDRANT_COLLECTION_NAME:cpdip-docs}

# Local ONNX Embedding Runtime
embedding.provider=${EMBEDDING_PROVIDER:onnx}
embedding.model-path=${EMBEDDING_MODEL_PATH:models/all-MiniLM-L6-v2/model.onnx}
embedding.tokenizer-path=${EMBEDDING_TOKENIZER_PATH:models/all-MiniLM-L6-v2/tokenizer.json}
embedding.dimension=384
embedding.max-tokens=${EMBEDDING_MAX_TOKENS:256}
embedding.normalize=${EMBEDDING_NORMALIZE:true}

# Retrieval tuning
retrieval.vector-limit=${RETRIEVAL_VECTOR_LIMIT:40}
retrieval.final-limit=${RETRIEVAL_FINAL_LIMIT:5}
retrieval.lexical-weight=${RETRIEVAL_LEXICAL_WEIGHT:0.35}
retrieval.exact-match-boost=${RETRIEVAL_EXACT_MATCH_BOOST:0.45}

# External LLM Configuration (Groq)
llm.chat.url=${LLM_URL:https://api.groq.com/openai/v1}
llm.chat.model=${LLM_MODEL:llama-3.1-8b-instant}
llm.temperature=0.1
llm.max.tokens=512
llm.api.key=${GROQ_API_KEY:}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${BASE_URL}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App
app.base-url=${APP_BASE_URL:https://developer-intelligence-platform-xivl.onrender.com}
