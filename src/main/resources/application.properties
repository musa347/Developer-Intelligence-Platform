spring.application.name=cp-dip
server.port=8080

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Qdrant
qdrant.host=${QDRANT_HOST}
qdrant.port=${QDRANT_PORT:6334}
qdrant.api-key=${QDRANT_API_KEY}
qdrant.use-tls=${QDRANT_USE_TLS:true}
qdrant.collection-name=${QDRANT_COLLECTION_NAME:cpdip-docs}

# Groq
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.api.key=${GROQ_API_KEY}
groq.chat.model=${GROQ_CHAT_MODEL:llama-3.1-8b-instant}
groq.timeout.connect=${GROQ_TIMEOUT_CONNECT:10}
groq.timeout.read=${GROQ_TIMEOUT_READ:30}

# Hugging Face
huggingface.api.url=${HUGGINGFACE_API_URL:https://api-inference.huggingface.co/models}
huggingface.api.key=${HUGGINGFACE_API_KEY}
huggingface.embedding.model=${HUGGINGFACE_EMBEDDING_MODEL:sentence-transformers/all-MiniLM-L6-v2}
huggingface.timeout.connect=${HUGGINGFACE_TIMEOUT_CONNECT:10}
huggingface.timeout.read=${HUGGINGFACE_TIMEOUT_READ:30}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${BASE_URL}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App
app.base-url=${APP_BASE_URL:https://developer-intelligence-platform-xivl.onrender.com}