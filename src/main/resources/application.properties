spring.application.name=cp-dip
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Free Qdrant Cloud Configuration
qdrant.host=${QDRANT_HOST:localhost}
qdrant.port=${QDRANT_PORT:6333}
qdrant.api.key=${QDRANT_API_KEY:}
qdrant.use.tls=${QDRANT_USE_TLS:false}
qdrant.collection-name=${QDRANT_COLLECTION_NAME:cpdip-docs}

# External Embedding Configuration (OpenAI - Free)
embedding.model.url=${EMBEDDING_URL:https://api.openai.com/v1}
embedding.model.name=${EMBEDDING_MODEL:text-embedding-3-small}
embedding.dimension=1536
embedding.api.key=${OPENAI_API_KEY:}

# External LLM Configuration (Groq)
llm.chat.url=${LLM_URL:https://api.groq.com/openai/v1}
llm.chat.model=${LLM_MODEL:llama-3.1-8b-instant}
llm.temperature=0.1
llm.max.tokens=512
llm.api.key=${GROQ_API_KEY:}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${BASE_URL}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App
app.base-url=${APP_BASE_URL:https://developer-intelligence-platform-xivl.onrender.com}